<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Tesouro Reserva vs Caixinhas</title>
    <!-- Importando o Chart.js para o gráfico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --nubank-color: #8A05BE;
            --tesouro-color: #00875F;
            --bg-color: #F4F4F5;
            --text-color: #27272A;
            --border-color: #E4E4E7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #FFFFFF;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            color: #18181B;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        /* Controles / Formulário */
        .controls {
            background: #FAFAFA;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #A1A1AA;
        }

        /* Resultados em Destaque */
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .result-card {
            padding: 1rem;
            border-radius: 8px;
            color: white;
            text-align: center;
        }

        .result-card.tesouro { background-color: var(--tesouro-color); }
        .result-card.caixinha { background-color: var(--nubank-color); }

        .result-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; }
        .result-value { font-size: 1.4rem; font-weight: bold; margin-top: 0.3rem; }

        /* Gráfico */
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .layout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Simulador de Rendimento: Tesouro vs Caixinha (10 Anos)</h1>
        
        <div class="layout-grid">
            
            <!-- Painel Esquerdo: Controles -->
            <div class="controls">
                <div class="form-group">
                    <label for="principal">Valor Inicial (R$)</label>
                    <input type="number" id="principal" value="10000" min="100" step="100" oninput="updateSimulation()">
                </div>

                <div class="form-group">
                    <label for="cdi">Taxa CDI Atual (% ao ano)</label>
                    <input type="number" id="cdi" value="10.5" min="2" max="20" step="0.1" oninput="updateSimulation()">
                </div>

                <div class="form-group">
                    <label for="caixinha">Rendimento da Caixinha (% do CDI)</label>
                    <input type="number" id="caixinha" value="100" min="80" max="150" step="1" oninput="updateSimulation()">
                </div>

                <div class="results-container">
                    <div class="result-card tesouro">
                        <div class="result-title">Tesouro Reserva Líquido</div>
                        <div class="result-value" id="final-tesouro">R$ 0,00</div>
                    </div>
                    <div class="result-card caixinha">
                        <div class="result-title">Caixinha Líquido</div>
                        <div class="result-value" id="final-caixinha">R$ 0,00</div>
                    </div>
                </div>
            </div>

            <!-- Painel Direito: Gráfico -->
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
            
        </div>
    </div>

    <script>
        let myChart = null;

        // Formata número para Moeda BRL
        const formatBRL = (value) => {
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        };

        function calculateData() {
            const principal = parseFloat(document.getElementById('principal').value) || 0;
            const cdi = parseFloat(document.getElementById('cdi').value) / 100 || 0;
            const caixinhaYield = parseFloat(document.getElementById('caixinha').value) / 100 || 0;
            
            const caixinhaRate = cdi * caixinhaYield;
            const years = 10;

            let labels = [];
            let dataTesouro = [principal];
            let dataCaixinha = [principal];
            labels.push('Início');

            let caixinhaBase = principal;

            for (let y = 1; y <= years; y++) {
                labels.push('Ano ' + y);

                // --- Cálculo Tesouro Reserva ---
                // IR é descontado sobre o lucro caso o resgate fosse feito naquele ano
                let grossTesouro = principal * Math.pow(1 + cdi, y);
                let irTesouro = 0.15; 
                if (y === 1) irTesouro = 0.20; // Aproximadamente < 360 dias
                // A partir do ano 2, o IR atinge a faixa mínima de 15% (acima de 720 dias)
                let netTesouro = principal + (grossTesouro - principal) * (1 - irTesouro);
                dataTesouro.push(netTesouro);

                // --- Cálculo Caixinha (Vencimento a cada 2 anos) ---
                // Descobre se estamos no 1º ou 2º ano do ciclo atual
                let cycleYear = (y % 2 === 0) ? 2 : 1; 
                let grossCaixinha = caixinhaBase * Math.pow(1 + caixinhaRate, cycleYear);
                let irCaixinha = (cycleYear === 1) ? 0.20 : 0.15;
                
                let netCaixinha = caixinhaBase + (grossCaixinha - caixinhaBase) * (1 - irCaixinha);
                dataCaixinha.push(netCaixinha);

                // No final do ciclo de 2 anos, o IR é obrigatoriamente pago e o líquido é reinvestido
                if (cycleYear === 2) {
                    caixinhaBase = netCaixinha;
                }
            }

            return { labels, dataTesouro, dataCaixinha, principal };
        }

        function updateSimulation() {
            const data = calculateData();

            // Atualizar as Caixas de Resultado com o valor do 10º ano
            const finalTesouro = data.dataTesouro[10];
            const finalCaixinha = data.dataCaixinha[10];

            document.getElementById('final-tesouro').innerText = formatBRL(finalTesouro);
            document.getElementById('final-caixinha').innerText = formatBRL(finalCaixinha);

            // Atualizar o Gráfico
            const ctx = document.getElementById('myChart').getContext('2d');

            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [
                        {
                            label: 'Tesouro Reserva',
                            data: data.dataTesouro,
                            borderColor: '#00875F',
                            backgroundColor: '#00875F',
                            borderWidth: 3,
                            pointBackgroundColor: '#00875F',
                            tension: 0.3
                        },
                        {
                            label: 'Caixinha do Nubank',
                            data: data.dataCaixinha,
                            borderColor: '#8A05BE',
                            backgroundColor: '#8A05BE',
                            borderWidth: 3,
                            pointBackgroundColor: '#8A05BE',
                            tension: 0.3
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += formatBRL(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        },
                        legend: {
                            position: 'bottom'
                        }
                    },
                    scales: {
                        y: {
                            ticks: {
                                callback: function(value) {
                                    return 'R$ ' + value.toLocaleString('pt-BR');
                                }
                            }
                        }
                    }
                }
            });
        }

        // Inicializa a simulação ao carregar a página
        window.onload = updateSimulation;

    </script>
</body>
</html>
